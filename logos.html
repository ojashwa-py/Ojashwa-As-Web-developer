    <style>
        .gallery-header {
            padding: 120px 0 60px;
            text-align: center;
        }

        .gallery-header h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin-bottom: 1rem;
        }

        .gallery-header p {
            color: var(--text-dim);
            max-width: 600px;
            margin: 0 auto 2rem;
            font-size: 1.1rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
            font-weight: 600;
            margin-bottom: 2rem;
            transition: transform 0.3s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        /* Dense Masonry-like Grid */
        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 10px;
            gap: 20px;
        }

        .masonry-item {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s var(--ease);
            position: relative;
            grid-row-end: span 20; /* Default span */
        }

        /* Varying spans for masonry effect */
        .masonry-item.tall { grid-row-end: span 35; }
        .masonry-item.wide { grid-row-end: span 25; }
        .masonry-item.square { grid-row-end: span 30; }

        .masonry-item:hover {
            transform: translateY(-10px);
            border-color: var(--text);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .masonry-item img, .masonry-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s var(--ease);
        }

        .masonry-item:hover img, .masonry-item:hover video {
            transform: scale(1.05);
        }

        .item-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(2px);
        }

        .masonry-item:hover .item-overlay {
            opacity: 1;
        }

        .zoom-icon {
            color: #fff;
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .masonry-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
    </style>
</head>
